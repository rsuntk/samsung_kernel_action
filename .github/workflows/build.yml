name: Build Kernel
on:
  workflow_dispatch:
    inputs:
      ROOTDIR_BRANCH:
        description: 'Bazel Rootdir Branch to build'
        default: 'master'
        required: true
      ROOTDIR_URL:
        description: 'Bazel Rootdir Repository URL'
        default: 'https://github.com/rsuntk/android_kernel_samsung_a05m-rootdir.git'
        required: true
      KERNEL_BRANCH:
        description: 'Common kernel branch'
        default: 'android15-6.6'
        required: true
      KERNEL_URL:
        description: 'Common kernel repository URL'
        default: 'https://github.com/rsuntk/android_kernel_samsung_a05m-6.6.git'
        required: true
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: rootdir
        show-progress: false
        fetch-depth: 1
        
    - name: Prepare dependencies
      run: |
        sudo apt update -y
        sudo apt install rsync bc cpio flex bison aptitude aria2 git python-is-python3 tar perl wget curl lz4 ccache -y
        sudo aptitude install libssl-dev -y

    - name: Clone Kernel Source
      run: |
        git clone --depth=1 --single-branch -b ${{ inputs.ROOTDIR_BRANCH }} ${{ inputs.ROOTDIR_URL }} kernel_root
        cd kernel_root
        git clone --depth=1 --single-branch -b ${{ inputs.ROOTDIR_BRANCH }} ${{ inputs.KERNEL_URL }} kernel-6.6
        cd -
      working-directory: rootdir

    - name: Fetch toolchains
      run: |
        cd kernel_root
        aria2c https://github.com/rsuntkOrgs/android_kernel_samsung_a05m-6.6/releases/download/v1.0/xaa
        aria2c https://github.com/rsuntkOrgs/android_kernel_samsung_a05m-6.6/releases/download/v1.0/xab
        echo "INFO: Appending files and extracting ..."
        cat xaa xab > toolchains.tar.gz; tar -xf toolchains.tar.gz; rm toolchains.tar.gz xaa xab
      working-directory: rootdir

    - name: Prepare timezone fix
      run: |
        sudo rm /etc/localtime
        sudo ln -s /usr/share/zoneinfo/Asia/Jakarta /etc/localtime

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 21

    - name: Build kernel
      id: buildKernel
      run: |
        cd kernel_root
        BUILD_TIME=$(date +'%Y%m%d%H%M')
        GIT_SHA=$(git rev-parse --short HEAD)
        DETAILS="A055F-${GIT_SHA}-${BUILD_TIME}"
        
        # Start building
        bash build_kernel.sh

        IMAGE_FILE="out/target/product/a05m/obj/KLEAF_OBJ/dist/kernel_device_modules-6.6/mgk_64_k66_kernel_aarch64.user/Image.gz"
        
        if [ ! -f "$IMAGE_FILE" ]; then
          echo "::error::Kernel Image.gz not found!"
          exit 1
        fi

        cp "$IMAGE_FILE" ../external/anykernel3/
        
        pushd ../external/anykernel3
        zip -r9 "../../${DETAILS}.zip" *
        popd

        echo "buildDetails=${DETAILS}" >> $GITHUB_OUTPUT
        echo "zipPath=$(pwd)/../${DETAILS}.zip" >> $GITHUB_OUTPUT
      working-directory: rootdir

    - name: List trees
      run: |
        cd kernel_root/out/target/product/a05m/obj/KLEAF_OBJ/dist/kernel_device_modules-6.6/mgk_64_k66_kernel_aarch64.user/
        ls -la
        find . -type f -name "Image.gz" || echo "Image.gz not found!"
      working-directory: rootdir

    - name: Upload AnyKernel3
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel3-${{ steps.buildKernel.outputs.buildDetails }}
        path: rootdir/external/anykernel3/*
        compression-level: 9

    - name: Upload Image.gz
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: Image_GZ-${{ steps.buildKernel.outputs.buildDetails }}
        path: rootdir/kernel_root/out/target/product/a05m/obj/KLEAF_OBJ/dist/kernel_device_modules-6.6/mgk_64_k66_kernel_aarch64.user/Image.gz
        compression-level: 9

    - name: Upload LKM
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: LKM-${{ steps.buildKernel.outputs.buildDetails }}
        path: rootdir/kernel_root/out/target/product/a05m/obj/KLEAF_OBJ/dist/kernel_device_modules-6.6/mgk_64_k66_kernel_aarch64.user/drivers/*
        compression-level: 9

    - name: Upload to telegram
      env:
        CHAT_ID: ${{ secrets.CHAT_ID }}
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        TITLE: "Galaxy A05 Kernel"
      run: |
        if [ ! -z "${{ secrets.BOT_TOKEN }}" ]; then
          export VERSION=$(cd kernel_root && git rev-list --count HEAD)
          ZIP=${{ steps.buildKernel.outputs.zipPath }}
          export MD5SUM="$(md5sum $ZIP | cut -d' ' -f1)"
          pip3 install telethon
          python3 scripts/bot.py $ZIP
        fi
      working-directory: rootdir
