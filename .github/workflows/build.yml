name: Build Kernel
on:
  workflow_dispatch:
    inputs:
      BRANCH:
        description: 'Branch to build'
        default: 'master'
        required: true
      URL:
        description: 'Repository URL'
        default: 'https://github.com/rsuntkOrgs/android_kernel_samsung_a05m-6.6.git'
        required: true
      FETCH_TOOLCHAIN:
        description: 'Update toolchain cache'
        type: boolean
        default: false
      USE_PRIVATE_REPO:
        description: 'Use private key'
        type: boolean
        default: false
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: rootdir
        show-progress: false
        fetch-depth: 1
        
    - name: Prepare dependencies
      run: |
        sudo apt update -y
        sudo apt install rsync bc cpio flex bison aptitude aria2 git python-is-python3 tar perl wget curl lz4 ccache -y
        sudo aptitude install libssl-dev -y

    - name: Clone Kernel Source
      run: |
        if [[ "${{ inputs.USE_PRIVATE_REPO }}" == "true" ]]; then
          ${{ secrets.REPO_CLONE }}
        else
          git clone --depth=1 --single-branch -b ${{ inputs.BRANCH }} ${{ inputs.URL }} kernel_root
        fi
      working-directory: rootdir

    - name: Fetch toolchains
      run: |
        cd kernel_root
        aria2c https://github.com/rsuntkOrgs/android_kernel_samsung_a05m-6.6/releases/download/v1.0/xaa
        aria2c https://github.com/rsuntkOrgs/android_kernel_samsung_a05m-6.6/releases/download/v1.0/xab
        echo "INFO: Appending files and extracting ..."
        cat xaa xab > toolchains.tar.gz; tar -xf toolchains.tar.gz; rm toolchains.tar.gz xaa xab
      working-directory: rootdir

    - name: Setup ccache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ccache
        key: ${{ runner.os }}-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-ccache-

    - name: Prepare ccache
      run: ccache -M 5G; ccache -z
        
    - name: Prepare timezone fix
      run: |
        sudo rm /etc/localtime
        sudo ln -s /usr/share/zoneinfo/Asia/Manila /etc/localtime

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 21

    - name: Build kernel
      if: github.event.inputs.FETCH_TOOLCHAIN != 'true'
      id: buildKernel
      run: |
        cd kernel_root
        export USE_CCACHE=1
        export CCACHE_DIR=~/.cache/ccache
        
        kernelVersion=$(cd kernel-6.6 && make kernelversion && cd ..)
        [ -f $(pwd)/build_kernel.sh ] && bash build_kernel.sh || exit 1
        [ ! -f $(pwd)/out/target/product/a05/obj/KLEAF_OBJ/dist/kernel_device_modules-6.6/mgk_64_k66_kernel_aarch64.user/Image.gz ] && exit 1
        gitsha1=$(git rev-parse --short HEAD)
        buildDetails="`echo $kernelVersion`-A055F_`echo $gitsha1`-`date +'%Y%m%d%H%M%S'`"
        echo "buildDetails=$buildDetails" >> $GITHUB_OUTPUT
        ccache -s
      working-directory: rootdir

    - name: List trees
      if: github.event.inputs.FETCH_TOOLCHAIN != 'true'
      run: |
        cd kernel_root/out/target/product/a05/obj/KLEAF_OBJ/dist/kernel_device_modules-6.6/mgk_64_k66_kernel_aarch64.user/
        ls -la
        find . -type f -name "Image.gz" || echo "Image.gz not found!"
      working-directory: rootdir

    - name: Upload AnyKernel3
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel3-${{ steps.buildKernel.outputs.buildDetails }}
        path: rootdir/external/anykernel3/*
        compression-level: 9

    - name: Upload Image.gz
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: Image_GZ-${{ steps.buildKernel.outputs.buildDetails }}
        path: rootdir/kernel_root/out/target/product/a05/obj/KLEAF_OBJ/dist/kernel_device_modules-6.6/mgk_64_k66_kernel_aarch64.user/Image.gz
        compression-level: 9

    - name: Upload LKM
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: LKM-${{ steps.buildKernel.outputs.buildDetails }}
        path: rootdir/kernel_root/out/target/product/a05/obj/KLEAF_OBJ/dist/kernel_device_modules-6.6/mgk_64_k66_kernel_aarch64.user/drivers/*
        compression-level: 9
